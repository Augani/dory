name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Audit Rust lockfile
        run: |
          cargo install cargo-audit --locked --version 0.22.2
          bash .github/scripts/test-rust-security.sh
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Audit website lockfile
        run: |
          npm ci --prefix website
          npm audit --prefix website --audit-level=high
      - name: Security boundary contracts
        run: bash .github/scripts/test-security-contracts.sh

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    permissions:
      contents: read
      security-events: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: swift
            runner: macos-latest
            build-mode: manual
          - language: javascript-typescript
            runner: ubuntu-latest
            build-mode: none
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Select Xcode
        if: matrix.language == 'swift'
        run: |
          newest="$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          echo "DEVELOPER_DIR=$newest/Contents/Developer" >> "$GITHUB_ENV"
      - name: Install Protocol Buffers compiler
        if: matrix.language == 'swift'
        run: brew install protobuf
      - uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - name: Build Swift surfaces
        if: matrix.language == 'swift'
        run: |
          scripts/test.sh swift
          scripts/test.sh build -- ENABLE_USER_SCRIPT_SANDBOXING=NO
      - uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
